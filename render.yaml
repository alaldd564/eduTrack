services:
  - type: web
    name: edu-backend
    env: python
    buildCommand: cd edu_backend && pip install -r requirements.txt
    startCommand: cd edu_backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.14
      - key: DATABASE_URL
        scope: service
      - key: ALLOWED_ORIGINS
        value: ""

  - type: pserv
    name: edu-db
    ipWhitelist: []
    plan: starter
    dbName: edu_db
    user: edu_user

envVars:
  - key: ALLOWED_ORIGINS
    value: https://your-project.vercel.app
